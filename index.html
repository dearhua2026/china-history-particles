<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国历史人物 - 神经元连接背景</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 Google Fonts 提升质感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="tsparticles"></div>

    <main class="content">
        <header>
            <h1 class="glow-text">华夏时空脉络</h1>
            <p class="subtitle">探索中国历史人物的千丝万缕</p>
        </header>
        
        <div class="glass-card">
            <h2>星辰大海中的历史坐标</h2>
            <p>每一个流动的节点都代表一位在历史长河中留下姓名的人物。他们交织穿梭，构成了绵延千年的中华文明图谱。</p>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">节点性质</span>
                    <span class="value">人物实契</span>
                </div>
                <div class="stat-item">
                    <span class="label">交互模式</span>
                    <span class="value">引力连线</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 加载 tsParticles 核心库与插件 -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
